# =============================================================================
# TIER 3 - Full Suite (manuel uniquement)
# =============================================================================
# E2E Playwright + Security audit + Gitleaks
# Coût: ~15-20 min (lancé manuellement)
# Quand: avant deploy prod, après gros refacto
# =============================================================================

name: Full Suite

on:
  workflow_dispatch: # Bouton "Run workflow" dans GitHub Actions

concurrency:
  group: full-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # E2E Tests avec Playwright
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Variables d'environnement - ADAPTER À TON PROJET
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/app_test"
      DATABASE_URL_UNPOOLED: "postgresql://postgres:postgres@localhost:5432/app_test"
      BETTER_AUTH_SECRET: "test-secret-key-for-ci-testing-only-not-production"
      BETTER_AUTH_URL: "http://localhost:3000"
      NODE_ENV: "production"
      PLAYWRIGHT_TEST_BASE_URL: "http://localhost:3000"
      HEADLESS: "true"
      CI: "true"
      PORT: 3000

      # Secrets optionnels - ADAPTER À TON PROJET
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: app_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --prod=false

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Deploy database migrations
        run: pnpm prisma migrate deploy

      - name: Verify database schema
        run: pnpm prisma migrate status

      - name: Build application
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Start application
        run: pnpm start &

      - name: Wait for application to be ready
        run: pnpm dlx wait-on@latest http://localhost:3000 --timeout 60000

      - name: Run Playwright tests
        run: pnpm test:e2e:ci

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Security Checks
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pour gitleaks - scan tout l'historique

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true # Warning seulement, ne bloque pas

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
